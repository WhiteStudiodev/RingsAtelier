## Version 2024/06/01
# Backend API reverse proxy for Rings Atelier
# This file is automatically included by the default site config via:
#   include /config/nginx/proxy-confs/*.subfolder.conf;

location /api/ {
    include /config/nginx/proxy.conf;
    include /config/nginx/resolver.conf;

    set $upstream_app backend;
    set $upstream_port 8000;
    set $upstream_proto http;

    proxy_pass $upstream_proto://$upstream_app:$upstream_port/api/;
}
