## Version 2024/06/01
# Rings Atelier default site config for LinuxServer SWAG
# Listens on 443 only for the main site; 80 is used for ACME HTTP validation and redirect.

# Redirect all non-ACME HTTP traffic to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow Let's Encrypt HTTP validation
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /config/www;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    server_name _;

    # Certificates managed by SWAG/Let's Encrypt
    ssl_certificate /config/keys/letsencrypt/fullchain.pem;
    ssl_certificate_key /config/keys/letsencrypt/privkey.pem;

    # SWAG's hardened SSL settings (protocols, ciphers, HSTS, etc.)
    include /config/nginx/ssl.conf;

    root /config/www;
    index index.html index.htm;

    # Reverse proxy to backend API (loaded from proxy-confs)
    include /config/nginx/proxy-confs/*.subfolder.conf;

    # Vue Router history mode fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to .htaccess/.htpasswd files
    location ~ /\.ht {
        deny all;
    }
}

# Subdomain reverse proxy configs (if any)
include /config/nginx/proxy-confs/*.subdomain.conf;
