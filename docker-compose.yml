services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rings-backend
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN:-}
      - CHAT_ID=${CHAT_ID:-}
      - DATABASE_URL=sqlite:///./data/leads.db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,https://${DOMAIN:-localhost}}
    volumes:
      - ./backend/data:/app/data
    networks:
      - rings-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: rings-frontend-builder
    volumes:
      - swag-www:/config/www
    command: >
      sh -c "rm -rf /config/www/* /config/www/.[!.]* 2>/dev/null || true &&
             cp -r /app/dist/. /config/www/ &&
             echo 'Frontend static files copied to SWAG www'"
    depends_on:
      - backend
    networks:
      - rings-network

  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: rings-swag
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - URL=${DOMAIN}
      - SUBDOMAINS=${SUBDOMAINS:-}
      - VALIDATION=${VALIDATION:-http}
      - EMAIL=${EMAIL:-}
      - ONLY_SUBDOMAINS=${ONLY_SUBDOMAINS:-false}
      - STAGING=${STAGING:-false}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - swag-www:/config/www
      - ./swag:/config
      - ./swag-config/nginx/proxy-confs/backend.subfolder.conf:/config/nginx/proxy-confs/backend.subfolder.conf:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    networks:
      - rings-network

volumes:
  swag-www:

networks:
  rings-network:
    driver: bridge
